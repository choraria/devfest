name: Sync Redirects

on:
  push:
    branches: [main]
    paths:
      - "data/devfest-data.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-redirects
  cancel-in-progress: false

jobs:
  sync-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Bulk Redirects to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_REDIRECT_LIST_ID: ${{ secrets.CLOUDFLARE_REDIRECT_LIST_ID }}
          DEVFEST_HOST: ${{ vars.DEVFEST_HOST }}
        run: node scripts/sync-cloudflare-redirects.mjs

  deploy-json:
    runs-on: ubuntu-latest
    needs: sync-cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hot-deploy JSON to gh-pages
        env:
          PAT_GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/deploy-json-only.mjs
